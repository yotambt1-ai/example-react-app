name: Deploy Project

on: push 

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Install Dependencies
              run: npm ci
            
            - name: Run Tests
              run: npm run test
    
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Build Project
          run: npm run build

        - name: Deploy
          run: echo "Deploying..."